<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dot Vingador - Menu</title>
    <style>
        body { 
            background: #000; 
            color: #fff; 
            font-family: 'Courier New', Courier, monospace; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        h1 { 
            color: #ff4757; 
            font-size: clamp(40px, 10vw, 60px); 
            text-shadow: 5px 5px #333; 
            margin-bottom: 40px;
            text-align: center;
        }
        button.main-btn { 
            background: #222; 
            color: #fff; 
            border: 2px solid #fff; 
            padding: 15px 30px; 
            font-size: 20px; 
            cursor: pointer; 
            display: block; 
            margin: 10px; 
            width: 100%; 
            max-width: 280px; 
            font-family: inherit;
            transition: 0.2s;
            border-radius: 8px;
        }
        button.main-btn:hover, button.main-btn:active { 
            background: #fff; 
            color: #000; 
            transform: scale(1.05);
        }
        
        #highscoreDisplay { 
            font-size: clamp(16px, 5vw, 24px); 
            color: #67e8f9; 
            margin-top: 30px; 
            text-align: center;
            line-height: 1.6;
            display: none; 
            border: 2px dashed #67e8f9;
            padding: 20px;
            border-radius: 10px;
            background: rgba(103, 232, 249, 0.1);
            width: 100%;
            max-width: 320px;
        }
    </style>
</head>
<body>

    <h1>DOT VINGADOR</h1>
    
    <button class="main-btn" onclick="window.location.href='game.html'">NOVO JOGO</button>
    <button class="main-btn" onclick="toggleHighscore()">HIGHSCORES</button>

    <div id="highscoreDisplay">
        🏆 <strong>RECORDES ATUAIS</strong> 🏆<br><br>
        Moedas: <span id="hsScore" style="color: #fbbf24;">0</span><br>
        Melhor Tempo: <span id="hsTime" style="color: #10b981;">--:--</span>
    </div>

    <script>
        function atualizarDadosHighscore() {
            let s = localStorage.getItem('bestScore') || 0;
            let t = localStorage.getItem('bestTime') || "--:--";
            document.getElementById('hsScore').innerText = s;
            document.getElementById('hsTime').innerText = t;
        }

        function toggleHighscore() {
            let display = document.getElementById('highscoreDisplay');
            if (display.style.display === 'block') {
                display.style.display = 'none'; 
            } else {
                atualizarDadosHighscore(); 
                display.style.display = 'block'; 
            }
        }
    </script>
</body>
</html>
